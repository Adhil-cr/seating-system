{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Reset Email Sent</title>
        <link rel="stylesheet" href="{% static 'css/main.css' %}">
    </head>
    <body class="auth-page">
        <div class="auth-shell">
            <div class="auth-info">
                <span class="auth-highlight">Email sent</span>
                <h1>Check your inbox</h1>
                <p>
                    If an account exists with that email, you will receive a reset link shortly.
                </p>
            </div>
            <div class="auth-card">
                <h2>Reset link sent</h2>
                <p class="auth-subtitle">Follow the instructions in the email to set a new password.</p>
                <p class="auth-footer">
                    Return to
                    <a href="{% url 'login' %}">Login</a>
                </p>
            </div>
        </div>
    </body>
</html>
