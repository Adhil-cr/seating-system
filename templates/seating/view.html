{% extends "base.html" %}
{% load static %}

{% block title %}View Seating{% endblock %}

{% block head %}
<!-- SECTION: Seating Viewer Styles -->
<style>
    :root {
        --sv-border: rgba(0,0,0,.12);
        --sv-border-light: rgba(0,0,0,.10);
    }

    /* SECTION: Layout Shell */
    #topbar,
    #stats-bar,
    #toolbar,
    #legend-bar {
        background: #fff;
    }

    #topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 13px 20px;
        border-bottom: 0.5px solid var(--sv-border);
        gap: 16px;
        flex-wrap: wrap;
    }

    #topbar h1 {
        font-size: 15px;
        font-weight: 500;
        color: var(--color-text-primary, #111);
        margin: 0;
    }

    #sub-title {
        font-size: 11px;
        color: #6b6b6b;
        margin: 2px 0 0;
    }

    .topbar-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .topbar-right {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
    }

    .topbar-right button {
        padding: 6px 13px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 0.5px solid rgba(0,0,0,.22);
        background: #fff;
        color: #111;
    }

    #btn-print {
        background: #1e3a5f;
        color: #fff;
        border-color: #1e3a5f;
    }

    #btn-print:hover {
        background: #16304f;
    }

    /* SECTION: Stats Bar */
    #stats-bar {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        padding: 9px 20px;
        border-bottom: 0.5px solid var(--sv-border-light);
    }

    .stat-pill {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        background: #f0efeb;
        border: 0.5px solid var(--sv-border);
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
    }

    .stat-pill strong {
        font-size: 13px;
        font-weight: 600;
        color: #111;
    }

    .stat-pill span {
        color: #6b6b6b;
    }

    .stat-pill.highlight {
        background: #1e3a5f;
        border-color: #1e3a5f;
        color: #fff;
    }

    .stat-pill.highlight strong,
    .stat-pill.highlight span {
        color: #fff;
    }

    .dept-pill {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(0,0,0,.08);
    }

    .dept-pill .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
    }

    /* SECTION: Toolbar */
    #toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 9px 20px;
        border-bottom: 0.5px solid var(--sv-border-light);
        gap: 10px;
        flex-wrap: wrap;
    }

    #exam-select {
        padding: 6px 10px;
        border-radius: 7px;
        border: 0.5px solid rgba(0,0,0,.22);
        background: #fff;
        color: #111;
        font-size: 12px;
        max-width: 320px;
    }

    #hall-tabs {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
    }

    .hall-tab {
        padding: 5px 13px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 0.5px solid rgba(0,0,0,.12);
        color: #6b6b6b;
        background: #fff;
        transition: background .1s ease;
    }

    .hall-tab:hover {
        background: #f0efeb;
    }

    .hall-tab.active {
        background: #1e3a5f;
        color: #fff;
        border-color: #1e3a5f;
    }

    /* SECTION: Legend */
    #legend-bar {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        padding: 7px 20px;
        border-bottom: 0.5px solid var(--sv-border-light);
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: #4d4d4d;
        font-weight: 600;
    }

    .legend-swatch {
        width: 11px;
        height: 11px;
        border-radius: 3px;
        display: inline-block;
        border: 1px solid transparent;
    }

    .legend-subjects {
        flex-basis: 100%;
        font-size: 11px;
        color: #6b6b6b;
        margin-top: 2px;
    }

    .subject-chip {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 4px;
        background: #DCE8FF;
        color: #1e3a5f;
        border: 1px solid rgba(30,58,95,.18);
        font-size: 10px;
        font-weight: 700;
        margin-left: 6px;
    }

    /* SECTION: Content */
    #content {
        background: #f5f4f0;
        padding: 16px 20px;
    }

    #hall-meta {
        margin-bottom: 12px;
    }

    #hall-title {
        font-size: 13px;
        font-weight: 500;
        color: #111;
        margin: 0;
    }

    #hall-desc {
        font-size: 11px;
        color: #9b9b9b;
        margin: 2px 0 0;
    }

    #seat-grid {
        display: grid;
        gap: 9px;
    }

    /* SECTION: Seat Cards */
    .seat-card {
        border-radius: 11px;
        border-left: 3px solid transparent;
        border-top: 0.5px solid rgba(0,0,0,.10);
        border-right: 0.5px solid rgba(0,0,0,.10);
        border-bottom: 0.5px solid rgba(0,0,0,.10);
        padding: 11px 11px 9px;
        cursor: pointer;
        transition: transform .1s ease, box-shadow .1s ease;
    }

    .seat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .seat-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 5px;
        gap: 6px;
    }

    .seat-reg,
    .seat-num {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 10px;
        color: #9b9b9b;
    }

    .seat-num {
        font-weight: 600;
    }

    .seat-name {
        font-size: 12px;
        font-weight: 500;
        color: #111;
        line-height: 1.35;
        margin-bottom: 4px;
        min-height: 32px;
    }

    .seat-meta {
        font-size: 10px;
        color: #6b6b6b;
        margin-bottom: 6px;
    }

    .subject-text {
        font-weight: 700;
        background: rgba(30,58,95,.08);
        padding: 1px 4px;
        border-radius: 4px;
    }

    .seat-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
    }

    .dept-badge {
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
        border: 1px solid rgba(0,0,0,.08);
    }

    .multi-badge {
        font-size: 9px;
        padding: 2px 6px;
        border-radius: 4px;
        background: #FFF3E0;
        color: #E65100;
        font-weight: 500;
    }

    .seat-empty {
        border-radius: 11px;
        background: #ebebea;
        border: 0.5px dashed rgba(0,0,0,.15);
        min-height: 95px;
    }

    /* SECTION: Loading/Error */
    .grid-message {
        font-size: 12px;
        color: #6b6b6b;
        padding: 10px 0;
    }

    /* SECTION: Modal */
    #modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
    }

    .modal-panel {
        background: #fff;
        border-radius: 14px;
        padding: 20px;
        width: 300px;
        border: 0.5px solid rgba(0,0,0,.12);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 14px;
    }

    .modal-name {
        font-size: 14px;
        font-weight: 500;
        color: #111;
    }

    #modal-close {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: #6b6b6b;
    }

    .modal-reg {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: #6b6b6b;
        margin-bottom: 14px;
    }

    .modal-row {
        display: flex;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 0.5px solid rgba(0,0,0,.08);
        gap: 10px;
    }

    .modal-row:last-child {
        border-bottom: none;
    }

    .modal-label {
        font-size: 12px;
        color: #6b6b6b;
    }

    .modal-value {
        font-size: 12px;
        font-weight: 500;
        color: #111;
        text-align: right;
        max-width: 180px;
    }
</style>
{% endblock %}

{% block content %}
<!-- SECTION: Topbar -->
<div id="topbar">
    <div class="topbar-left">
        <h1>College Exam Seating Allocation System</h1>
        <p id="sub-title">Loading...</p>
    </div>
    <div class="topbar-right">
        <button id="btn-pdf">Export PDF</button>
        <button id="btn-excel">Export Excel</button>
        <button id="btn-print">Print</button>
    </div>
</div>

<!-- SECTION: Stats Bar -->
<div id="stats-bar"></div>

<!-- SECTION: Toolbar -->
<div id="toolbar">
    <select id="exam-select"></select>
    <div id="hall-tabs"></div>
</div>

<!-- SECTION: Legend Bar -->
<div id="legend-bar"></div>

<!-- SECTION: Content -->
<div id="content">
    <div id="hall-meta">
        <h2 id="hall-title"></h2>
        <p id="hall-desc"></p>
    </div>
    <div id="seat-grid"></div>
</div>

<!-- SECTION: Modal Overlay -->
<div id="modal-overlay" style="display: none;">
    <div class="modal-panel">
        <div class="modal-header">
            <div class="modal-name" id="modal-name"></div>
            <button id="modal-close" type="button">✕</button>
        </div>
        <div class="modal-reg" id="modal-reg"></div>
        <div id="modal-details"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- SECTION: Seating Viewer Script -->
<script src="{% static 'js/seating_view.js' %}"></script>
{% endblock %}
