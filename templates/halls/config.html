{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Hall Configuration</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

<div class="hall-config">
    <h2>Hall Configuration</h2>

    <div class="form-row">
        <label>Hall Name</label>
        <input type="text" id="hall-name" placeholder="Hall Name">
    </div>

    <div class="form-row">
        <label>Rows</label>
        <input type="number" id="hall-rows" placeholder="Rows">
    </div>

    <div class="form-row">
        <label>Columns</label>
        <input type="number" id="hall-columns" placeholder="Columns">
    </div>

    <button id="save-hall-btn">Add Hall</button>
</div>

<script src="{% static 'js/halls_config.js' %}"></script>
</body>
</html>
