{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <!-- CHANGED: benchmap branding -->
        <title>Sign in — benchmap</title>
        <link rel="icon" type="image/svg+xml" href="{% static 'images/benchmap_logo.png' %}">
        <link rel="stylesheet" href="{% static 'css/main.css' %}">
    </head>
    <body class="auth-page">
        <div class="auth-shell">
            <div class="auth-info">
                <span class="auth-highlight">Exam Seating System</span>
                <h1>Welcome back to the allocation dashboard</h1>
                <p>
                    Log in to manage exams, halls, and seating assignments in one
                    streamlined workspace.
                </p>
            </div>
            <div class="auth-card">
                <!-- CHANGED: benchmap branding -->
                <div class="auth-brand">
                    <div class="auth-logo-wrap">
                        <img src="{% static 'images/benchmap_logo.png' %}"
                             alt="benchmap"
                             class="auth-logo-img">
                    </div>
                    <h1 class="auth-brand-name">benchmap</h1>
                    <p class="auth-brand-sub">Exam seating allocation system</p>
                </div>

                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Login to continue</p>

                <form id="login-form">
                    <label>Username or Email</label>
                    <input id="login-username" type="text" placeholder="Enter username or email">

                    <label>Password</label>
                    <input id="login-password" type="password" placeholder="Enter password">

                    <div class="auth-options">
                        <label class="remember">
                            <input type="checkbox">
                            Remember me
                        </label>
                    </div>

                    <button class="btn-primary full-width" type="submit">
                        Login
                    </button>
                </form>

                <p class="auth-footer">
                    Don't have an account?
                    <a href="{% url 'signup' %}">Sign up</a>
                </p>
            </div>
        </div>
        <script src="{% static 'js/login.js' %}"></script>
    </body>
</html>
